<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CBSE Result Sheet</title>
    <style>
        table {
            width: 80%;
            margin: 20px auto;
            border-collapse: collapse;
            font-family: Arial, sans-serif;
        }

        thead {
            background-color: #4CAF50;
            color: white;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: center;
        }

        tbody tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        tbody tr:hover {
            background-color: #ddd;
        }

        caption {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <table>
        <caption>CBSE Result Sheet</caption>

        <thead>
            <tr>
                <th>Subject</th>
                <th>Marks Obtained</th>
                <th>Maximum Marks</th>
                <th>Grade</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>Mathematics</td>
                <td>95</td>
                <td>100</td>
                <td>A1</td>
            </tr>
            <tr>
                <td>Science</td>
                <td>92</td>
                <td>100</td>
                <td>A1</td>
            </tr>
            <tr>
                <td>English</td>
                <td>88</td>
                <td>100</td>
                <td>A2</td>
            </tr>
            <tr>
                <td>Social Science</td>
                <td>90</td>
                <td>100</td>
                <td>A1</td>
            </tr>
            <tr>
                <td>Hindi</td>
                <td>85</td>
                <td>100</td>
                <td>A2</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
